name: External Validation

on:
  workflow_dispatch:

jobs:
  external-validation:
    name: Parasail and Edlib validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install external validators
        run: python -m pip install parasail edlib
      - name: Validate HCP-DP scores against external libraries
        run: python scripts/validate_external.py --required
