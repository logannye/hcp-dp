name: Feature request
description: Suggest an algorithm, CLI workflow, output format, or validation target.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What are you trying to do that HCP-DP does not support well yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the command, API, algorithm, or documentation change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - hcp-align CLI
        - Rust library API
        - Dynamic-programming kernel
        - Validation or benchmarks
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Correctness or validation notes
      description: Are there baseline tools, datasets, or known examples that should verify this feature?
