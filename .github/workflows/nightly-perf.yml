name: Nightly Perf

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the job on regression"
        default: "0"
        required: false

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run benches with baseline comparison
        env:
          RUN_BENCH: "1"
          PERF_ENFORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce || '1' }}
        run: |
          bash scripts/check.sh
      - name: Generate performance report
        run: python3 scripts/perf_report.py --scenario edit_distance --verify-limit 128
      - name: Upload performance artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nightly-perf-report
          path: |
            target/hcp-dp-report/
            target/criterion/
